name: Build and Test on Multiple Platforms

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

jobs:
  # Job 1: Build on Ubuntu (Generic Linux)
  build-linux:
    uses: ./.github/workflows/build.yml
    with:
      os: ubuntu-latest
      build_type: ${{ github.event.inputs.build_type || 'Release' }}
      use_container: false

  # Job 2: Build on RHEL 7 (using Rocky Linux 8 as closest match)
  build-rhel7:
    uses: ./.github/workflows/build.yml
    with:
      os: ubuntu-latest
      build_type: ${{ github.event.inputs.build_type || 'Release' }}
      use_container: true
      container_image: rockylinux:8

  # Job 3: Build on RHEL 9 (using Rocky Linux 9)
  build-rhel9:
    uses: ./.github/workflows/build.yml
    with:
      os: ubuntu-latest
      build_type: ${{ github.event.inputs.build_type || 'Release' }}
      use_container: true
      container_image: rockylinux:9

  # Job 4: Build on Windows
  build-windows:
    uses: ./.github/workflows/build.yml
    with:
      os: windows-latest
      build_type: ${{ github.event.inputs.build_type || 'Release' }}
      use_container: false

  # Job 5: Build on macOS
  build-macos:
    uses: ./.github/workflows/build.yml
    with:
      os: macos-latest
      build_type: ${{ github.event.inputs.build_type || 'Release' }}
      use_container: false